server {
    listen 80;
    server_name localhost;
    
    client_max_body_size 500M;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    
    location /inference {
        # Connect to whisper-server running natively on macOS
        proxy_pass http://host.docker.internal:8080/inference;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location /v1/ {
        # Connect to Docker Model Runner API
        proxy_pass http://model-runner.docker.internal/engines/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /extract-audio {
        # Connect to audio extraction service
        proxy_pass http://host.docker.internal:5000/extract-audio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /audio-health {
        # Health check for audio extraction service
        proxy_pass http://host.docker.internal:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

